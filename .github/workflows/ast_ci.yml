name: DevAgent AST Code Inspector

#触发时机：
on:

  push:
  #往main分支推代码（冒号后必须有空格）
    branches: [ "main" ]
  pull_request:
  #往main分支发送合并代码请求
    branches: [ "main" ]

jobs:
  ast-scan:
    #分配虚拟机服务器
    runs-on: ubuntu-latest
    steps:
    - name: 拉取代码
      uses: actions/checkout@v4 #克隆代码
  
    - name: 配置Python 3.13环境
      uses: actions/setup-python@v5
      with:
        python-version:"3.13"
        cache:'pip'
  
    - name: 安装依赖
      run: |                  #先升级一下pip包
      python -m pip install --upgrade pip
      if[ -f requirements.txt ]; then pip install -r requirements.txt;fi
  
    - name: 启动AST代码分析
      run: |        #环境变量调成项目根目录

      PYTHONPATH=. python scripts/ast_ci.py
      